{{ define "main" }}
{{/* Single post — rendered as a macOS window on the desktop */}}
<div class="desktop-icons" style="top:16px;right:16px;">
  <div class="desktop-icon" data-app="finder" onclick="window.location.href='/'">
    <div class="desktop-icon-img">🏠</div>
    <div class="desktop-icon-label">Home</div>
  </div>
</div>

<div class="macos-window visible"
     style="width:700px;height:540px;top:50px;left:calc(50vw - 350px);z-index:300;">
  <div class="win-chrome">
    <div class="traffic-lights">
      <button class="tl-btn tl-close" onclick="history.back()"></button>
      <button class="tl-btn tl-min" onclick=""></button>
      <button class="tl-btn tl-max" onclick=""></button>
    </div>
    <div class="win-title">{{ .Title }}</div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:28px 36px;background:#fffef7;
              font-family:Georgia,'Times New Roman',serif;font-size:14px;
              line-height:1.8;color:#2c2311;user-select:text;">
    <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;
               font-family:-apple-system,sans-serif;color:#1d1d1f;">
      {{ .Title }}
    </h1>
    {{ if not .Date.IsZero }}
    <p style="font-size:12px;color:#8a7d5a;font-family:-apple-system,sans-serif;margin-bottom:22px;">
      {{ .Date.Format "Monday, January 2, 2006" }}
    </p>
    {{ end }}
    {{ .Content }}
    <hr style="border:none;border-top:1px solid rgba(0,0,0,0.1);margin:24px 0;">
    <p style="font-size:12px;color:#aaa;font-family:-apple-system,sans-serif;">
      <a href="{{ .Section | absURL }}" style="color:#b07d00;">← Back to {{ .Section | title }}</a>
    </p>
  </div>
</div>
{{ end }}
