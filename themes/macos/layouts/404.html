{{ define "main" }}
<div class="macos-window visible"
     style="width:480px;height:300px;top:calc(50vh - 150px);left:calc(50vw - 240px);z-index:300;">
  <div class="win-chrome">
    <div class="traffic-lights">
      <button class="tl-btn tl-close" onclick="window.location.href='/'"></button>
      <button class="tl-btn tl-min" onclick=""></button>
      <button class="tl-btn tl-max" onclick=""></button>
    </div>
    <div class="win-title">404 — Not Found</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;
              justify-content:center;gap:12px;padding:24px;text-align:center;
              background:#fff;user-select:text;">
    <div style="font-size:56px;">🔍</div>
    <h1 style="font-size:20px;font-weight:700;color:#1d1d1f;
               font-family:-apple-system,sans-serif;">Page Not Found</h1>
    <p style="font-size:13px;color:#666;max-width:280px;line-height:1.5;">
      The item you're looking for has been moved, deleted, or never existed.
    </p>
    <a href="/" style="display:inline-block;margin-top:8px;padding:8px 20px;
                       background:#0071e3;color:#fff;border-radius:8px;
                       font-size:13px;font-family:-apple-system,sans-serif;
                       text-decoration:none;font-weight:500;">
      Go Home
    </a>
  </div>
</div>
{{ end }}
